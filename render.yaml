services:
  - type: web
    name: trello2
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: trello2-db
          property: connectionString

databases:
  - name: trello2-db
    plan: free
    region: frankfurt
