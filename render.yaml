services:
  - type: web
    name: deepfocus
    env: node
    region: frankfurt
    plan: free
    root: .
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/ping
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: deepfocus-db
          property: connectionString

databases:
  - name: deepfocus-db
    plan: free
    region: frankfurt
